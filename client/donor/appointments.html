<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donor Appointments | BloodSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div id="sidebarMount"></div>
      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="h2">Appointments & Screening</h1>
            <p class="meta">Manage appointments, screening, and feedback.</p>
          </div>
          <button id="menuToggle" class="btn btn-secondary mobile-only">Menu</button>
        </header>

        <section class="section">
          <article class="glass-card card">
            <h3 class="h3">Appointments</h3>
            <form id="appointmentForm" style="margin-top:12px;">
              <div class="grid-3">
                <div class="form-group"><label>Request ID</label><input name="requestId" type="number" min="1" required /></div>
                <div class="form-group"><label>Slot Date & Time</label><input name="slotAt" type="datetime-local" required /></div>
                <div class="form-group"><label>Notes</label><input name="notes" /></div>
              </div>
              <button class="btn btn-primary" type="submit">Book Appointment</button>
            </form>
            <div class="table-wrap" style="margin-top:12px;">
              <table>
                <thead><tr><th>ID</th><th>Hospital</th><th>Slot</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="appointmentsBody"></tbody>
              </table>
            </div>
          </article>
        </section>

        <section class="section grid-2">
          <article class="glass-card card">
            <h3 class="h3">Pre-Donation Screening</h3>
            <form id="screeningForm" style="margin-top:12px;">
              <div class="grid-2">
                <div class="form-group"><label>Fever in last 14 days?</label><select name="fever14d"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="form-group"><label>Surgery in last 6 months?</label><select name="surgery6m"><option value="no">No</option><option value="yes">Yes</option></select></div>
              </div>
              <div class="grid-2">
                <div class="form-group"><label>Travel history concern?</label><select name="travelHistory"><option value="no">No</option><option value="yes">Yes</option></select></div>
                <div class="form-group"><label>Hemoglobin (g/dL)</label><input name="hemoglobin" type="number" step="0.1" min="0" /></div>
              </div>
              <button class="btn btn-secondary" type="submit">Submit Screening</button>
            </form>
          </article>
          <article class="glass-card card">
            <h3 class="h3">Feedback</h3>
            <form id="feedbackForm" style="margin-top:8px;">
              <div class="grid-3">
                <div class="form-group"><label>Hospital User ID</label><input name="hospitalId" type="number" min="1" required /></div>
                <div class="form-group"><label>Rating</label><input name="rating" type="number" min="1" max="5" required /></div>
                <div class="form-group"><label>Donation ID (optional)</label><input name="donationId" type="number" min="1" /></div>
              </div>
              <div class="form-group"><label>Feedback</label><input name="feedback" /></div>
              <button class="btn btn-secondary" type="submit">Submit Feedback</button>
            </form>
          </article>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/js/donor-appointments.js"></script>
  </body>
  </html>
