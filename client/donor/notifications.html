<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donor Notifications | BloodSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div id="sidebarMount"></div>
      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="h2">Notifications</h1>
            <p class="meta">Read/unread updates for requests, appointments, and camps.</p>
          </div>
          <div class="btn-group">
            <button id="markAllReadBtn" class="btn btn-secondary">Mark all read</button>
            <button id="menuToggle" class="btn btn-secondary mobile-only">Menu</button>
          </div>
        </header>

        <section class="section">
          <article class="glass-card card">
            <p class="meta">Unread: <strong id="unreadCount">0</strong></p>
            <div class="table-wrap" style="margin-top:12px;">
              <table>
                <thead><tr><th>Time</th><th>Type</th><th>Title</th><th>Message</th><th>Action</th></tr></thead>
                <tbody id="notificationsBody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/js/donor-notifications.js"></script>
  </body>
  </html>
