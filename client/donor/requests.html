<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donor Requests | BloodSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div id="sidebarMount"></div>
      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="h2">Nearby Requests</h1>
            <p class="meta">Filter and respond to matching blood requests.</p>
          </div>
          <button id="menuToggle" class="btn btn-secondary mobile-only">Menu</button>
        </header>

        <section class="section">
          <article class="glass-card card">
            <p class="meta">Eligibility: <strong id="eligibility">-</strong></p>
            <div class="btn-group" style="margin-top:12px;">
              <select id="filterBloodGroup">
                <option value="">All Groups</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
              </select>
              <input id="filterDistanceKm" type="number" min="1" max="300" placeholder="Max km" />
              <label class="meta"><input id="sortUrgency" type="checkbox" /> Sort urgency</label>
              <button id="applyRequestFilters" class="btn btn-secondary" type="button">Apply</button>
            </div>
          </article>
        </section>

        <section class="section">
          <div id="requestsGrid" class="grid-3"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/js/donor-requests.js"></script>
  </body>
  </html>
