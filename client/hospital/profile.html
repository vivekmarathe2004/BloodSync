<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Profile | BloodSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="profile">
    <div class="dashboard">
      <div id="sidebarMount"></div>
      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="h2">Hospital Profile</h1>
            <p class="meta">Manage profile and verification details.</p>
          </div>
          <button id="menuToggle" class="btn btn-secondary mobile-only">Menu</button>
        </header>

        <section class="section">
          <article class="glass-card card">
            <div class="topbar">
              <h3 class="h3">Profile Details</h3>
              <div id="verificationStatus"></div>
            </div>
            <form id="hospitalProfileForm">
              <div class="grid-2">
                <div class="form-group"><label>Hospital Name</label><input name="hospitalName" required /></div>
                <div class="form-group"><label>Address</label><input name="address" required /></div>
              </div>
              <div class="grid-2">
                <div class="form-group"><label>City</label><input name="city" /></div>
                <div class="form-group"><label>State</label><input name="state" /></div>
              </div>
              <div class="grid-2">
                <div class="form-group"><label>Contact Phone</label><input name="contactPhone" /></div>
                <div class="form-group"><label>Contact Email</label><input name="contactEmail" type="email" /></div>
              </div>
              <div class="grid-2">
                <div class="form-group"><label>Logo URL</label><input name="logoUrl" /></div>
                <div class="form-group"><label>Operating Hours</label><input name="operatingHours" /></div>
              </div>
              <div class="grid-2">
                <div class="form-group"><label>Blood Bank License Number</label><input name="bloodBankLicenseNumber" /></div>
                <div class="form-group"><label>Latitude</label><input name="latitude" type="number" step="any" /></div>
              </div>
              <div class="grid-2">
                <div class="form-group"><label>Longitude</label><input name="longitude" type="number" step="any" /></div>
              </div>
              <button class="btn btn-primary" type="submit">Save Profile</button>
            </form>
          </article>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/js/hospital-sections.js"></script>
  </body>
</html>
