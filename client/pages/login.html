<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | BloodSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="auth">
      <section class="auth-left">
        <h1 class="h1">Welcome Back to BloodSync</h1>
        <p>Securely access your donor, hospital, or admin dashboard.</p>
      </section>
      <section class="auth-right">
        <form id="authForm" class="auth-form glass-card" data-mode="login">
          <h2 class="h2">Sign In</h2>
          <div class="form-group floating">
            <input id="email" name="email" type="email" placeholder=" " required />
            <label for="email">Email</label>
            <span id="emailError" class="error"></span>
          </div>
          <div class="form-group">
            <div style="display:flex;align-items:center;gap:8px;">
              <input id="password" name="password" type="password" placeholder="Password" required />
              <button id="passwordToggleBtn" class="btn btn-secondary" type="button">Show</button>
            </div>
            <span id="passwordError" class="error"></span>
          </div>
          <div class="form-group">
            <div style="height:8px;background:#edf1f7;border-radius:999px;overflow:hidden;">
              <div id="meterBar" style="height:100%;width:0%;background:#e63946;"></div>
            </div>
            <span id="meterLabel" class="helper">Strength</span>
          </div>
          <div class="form-group">
            <p class="helper" style="margin-bottom:8px;">Quick Test Login</p>
            <div class="btn-group" style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-secondary fill-cred-btn" type="button" data-email="admin@bloodsync.com" data-password="Password@123">
                Admin
              </button>
              <button class="btn btn-secondary fill-cred-btn" type="button" data-email="donor1@mail.com" data-password="Password@123">
                Donor
              </button>
              <button class="btn btn-secondary fill-cred-btn" type="button" data-email="hosp1@mail.com" data-password="Password@123">
                Hospital
              </button>
            </div>
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
          <p class="meta">No account? <a href="/pages/register.html">Register now</a></p>
        </form>
      </section>
    </main>
    <script type="module" src="/assets/js/auth.js"></script>
  </body>
  </html>
